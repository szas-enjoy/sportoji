<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sportoji 🏆</title>

<!-- Google Analytics LIGHT (no cookies) -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-XXXXXXX"></script>
<script>
window.dataLayer = window.dataLayer || [];
function gtag(){dataLayer.push(arguments);}
gtag('js', new Date());

gtag('config', 'G-XXXXXXX', {
  'anonymize_ip': true,
  'client_storage': 'none'
});
</script>

<style>
body {
  margin: 0;
  font-family: system-ui;
  background: linear-gradient(135deg, #0f172a, #1e293b);
  color: white;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}
.container {
  background: rgba(255,255,255,0.05);
  padding: 25px;
  border-radius: 20px;
  width: 90%;
  max-width: 420px;
  text-align: center;
}
.stats {
  display: flex;
  justify-content: space-between;
  font-size: 0.9em;
  opacity: 0.8;
}
.emoji {
  font-size: 3em;
  margin: 20px 0;
}
input {
  width: 100%;
  padding: 12px;
  border-radius: 10px;
  border: none;
  text-align: center;
}
button {
  margin-top: 10px;
  padding: 12px;
  width: 100%;
  border-radius: 10px;
  border: none;
  background: #22c55e;
  color: white;
  cursor: pointer;
}
#hint {
  margin-top: 10px;
  font-size: 0.9em;
  opacity: 0.7;
}
.hearts {
  margin: 10px 0;
}
</style>
</head>

<body>

<div class="container">
  <h1>🏆 Sportoji</h1>

  <div class="stats">
    <div id="level"></div>
    <div id="score"></div>
  </div>

  <div class="hearts" id="lives"></div>
  <div class="emoji" id="emoji"></div>
  <div id="hint"></div>

  <input id="answer" placeholder="Ta réponse..." autofocus>
  <button onclick="checkAnswer()">Valider</button>

  <div id="result"></div>
</div>

<script>

// ===== QUESTIONS =====
// type = indice affiché

const questions = [
  {id:"jordan", emoji:"🏀🐐🇺🇸👑🔥", answers:["jordan","michael jordan"], level:1, type:"👤 Joueur"},
  {id:"mbappe", emoji:"⚽🇫🇷🚀🐢🏆", answers:["mbappe","mbappé"], level:1, type:"👤 Joueur"},
  {id:"messi", emoji:"⚽🇦🇷🐐👑🏆", answers:["messi"], level:1, type:"👤 Joueur"},
  {id:"ronaldo", emoji:"⚽🇵🇹👑🔥", answers:["ronaldo"], level:2, type:"👤 Joueur"},
  {id:"zidane", emoji:"⚽🇫🇷🧠🎯", answers:["zidane"], level:2, type:"👤 Joueur"},
  {id:"wembanyama", emoji:"🏀🇫🇷🦒🚀", answers:["wembanyama","wemby"], level:2, type:"👤 Joueur"},
  {id:"tiger", emoji:"⛳🐅🏆", answers:["tiger woods","woods"], level:2, type:"👤 Joueur"},
  {id:"lebron", emoji:"🏀👑🇺🇸", answers:["lebron"], level:2, type:"👤 Joueur"},
  {id:"curry", emoji:"🏀🎯🔥", answers:["curry"], level:2, type:"👤 Joueur"},

  {id:"psg", emoji:"⚽🇫🇷🔵🔴", answers:["psg","paris saint germain"], level:2, type:"🏟️ Club"},
  {id:"om", emoji:"⚽🔵⚪", answers:["om","marseille"], level:3, type:"🏟️ Club"},
  {id:"real", emoji:"⚽👑⚪", answers:["real madrid"], level:2, type:"🏟️ Club"},
  {id:"barca", emoji:"⚽🔵🔴🐐", answers:["barcelona","barcelone"], level:2, type:"🏟️ Club"},

  {id:"ldc", emoji:"⚽🏆🌍", answers:["ligue des champions","champions league"], level:2, type:"🏆 Compétition"},
  {id:"cdm", emoji:"⚽🌍🏆", answers:["coupe du monde","world cup"], level:2, type:"🏆 Compétition"},
  {id:"nba", emoji:"🏀🇺🇸🔥", answers:["nba"], level:2, type:"🏆 Ligue"},
  {id:"tour", emoji:"🚴🇫🇷⛰️", answers:["tour de france"], level:2, type:"🏆 Compétition"},

  {id:"nadal", emoji:"🎾🐂🇪🇸", answers:["nadal"], level:3, type:"👤 Joueur"},
  {id:"djokovic", emoji:"🎾🇷🇸🧱", answers:["djokovic"], level:3, type:"👤 Joueur"},
  {id:"federer", emoji:"🎾🇨🇭👑", answers:["federer"], level:3, type:"👤 Joueur"}
];

// ===== GAME =====

let game = questions.sort(() => Math.random() - 0.5);
let current = 0;
let score = 0;
let lives = 5;

function normalize(text) {
  return text.toLowerCase()
    .normalize("NFD")
    .replace(/[\u0300-\u036f]/g, "")
    .trim();
}

function updateLives() {
  document.getElementById("lives").textContent =
    "❤️".repeat(lives) + "🖤".repeat(5-lives);
}

function loadQuestion() {
  const q = game[current];
  document.getElementById("emoji").textContent = q.emoji;
  document.getElementById("level").textContent = "Niveau " + q.level;
  document.getElementById("score").textContent = score + "/" + game.length;
  document.getElementById("hint").textContent = "Indice : " + q.type;
  document.getElementById("answer").value = "";
  document.getElementById("result").textContent = "";
}

function checkAnswer() {
  const input = normalize(document.getElementById("answer").value);
  const valid = game[current].answers.map(normalize);

  let correct = valid.includes(input);

  // tracking
  gtag('event', 'answer', {result: correct ? 'correct' : 'wrong'});

  if (correct) {
    score++;
    document.getElementById("result").textContent = "✅ Bien joué !";
  } else {
    lives--;
    document.getElementById("result").textContent =
      "❌ " + game[current].answers[0];
  }

  updateLives();
  current++;

  if (lives <= 0 || current >= game.length) {
    endGame();
    return;
  }

  setTimeout(loadQuestion, 800);
}

function endGame() {
  document.getElementById("emoji").textContent = "🏁";
  document.getElementById("hint").textContent = "";

  const message = "Score " + score + "/" + game.length;

  document.getElementById("result").innerHTML =
    message + "<br><button onclick='shareScore()'>Partager</button>";

  gtag('event', 'game_end', {score: score});
}

function shareScore() {
  const text = "🏆 Sportoji\nScore: " + score + "/" + game.length;
  navigator.clipboard.writeText(text);
  alert("Score copié !");
}

document.getElementById("answer").addEventListener("keypress", e => {
  if (e.key === "Enter") checkAnswer();
});

updateLives();
loadQuestion();

</script>

</body>
</html>
